<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" type="image/png" href="{{ "favicon-32x32.png" | relURL }}" sizes="32x32">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
<a href="#main-content" class="skip-link sr-only">Skip to main content</a>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="{{ "/" | relURL }}" class="nav-brand">{{ .Site.Title | upper }}</a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" role="list">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | relURL }}" {{ if eq $.RelPermalink .URL }}class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </div>
</nav>

<main id="main-content">
  {{ block "main" . }}{{ end }}
</main>

<footer class="site-footer" role="contentinfo">
  <div class="footer-inner">
    <p>{{ .Site.Params.name }} &middot; {{ .Site.Params.institution }}</p>
  </div>
</footer>

<script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
